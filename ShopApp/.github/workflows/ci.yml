name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ve Lint
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Bağımlılıkları Yükle
        run: npm ci

      - name: TypeScript Kontrol
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Testler
        run: npm test -- --watchAll=false --passWithNoTests
