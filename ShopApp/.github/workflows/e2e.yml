name: E2E (Maestro)

# NOT: Bu workflow, ./build/ShopApp.app altında önceden derlenmiş bir iOS Simulator
# build'i olduğunu varsayar (örn. `eas build --profile preview --platform ios --local`
# ile üretilip bir önceki job'dan `actions/download-artifact` ile indirilir).
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Maestro E2E
    runs-on: macos-latest # iOS Simulator için macOS gerekli

    steps:
      - uses: actions/checkout@v4

      - name: Maestro Kur
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: iOS Simulator Başlat
        run: |
          xcrun simctl boot "iPhone 15" || true
          open -a Simulator

      - name: Uygulamayı Simulator'a Yükle
        run: xcrun simctl install booted ./build/ShopApp.app

      - name: E2E Testleri Çalıştır
        run: |
          ~/.maestro/bin/maestro test e2e/sepete_ekle_flow.yaml
          ~/.maestro/bin/maestro test e2e/deeplink_urun_flow.yaml
